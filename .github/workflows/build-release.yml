name: Build Release

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Trigger type: tag, commit, or branch'
        required: true
        default: 'branch'
        type: choice
        options:
          - tag
          - commit
          - branch
      trigger_value:
        description: 'Tag name (8.2.1, 9.0.2), commit SHA or branch name (e.g. develop, 9.1.x)'
        required: true
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*' # e.g. 8.2.1, 9.0.2, 9.1.0

permissions:
  contents: read   #   to fetch code (actions/checkout)

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref and version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag trigger
            REF="${{ github.ref }}"
            TRIGGER="tag"
            VERSION="${{ github.ref_name }}"
          else
            # branch or commit
            TRIGGER="${{ github.event.inputs.trigger }}"
            TRIGGER_VALUE="${{ github.event.inputs.trigger_value }}"

            case "$TRIGGER" in
              tag)
                REF="refs/tags/${TRIGGER_VALUE}"
                VERSION="$TRIGGER_VALUE"
                ;;
              commit)
                REF="$TRIGGER_VALUE"
                VERSION=""
                ;;
              branch)
                REF="$TRIGGER_VALUE"
                VERSION=""
                ;;
              *)
                echo "Invalid trigger: $TRIGGER"
                exit 1
                ;;
            esac
          fi

          # node 16 for 8.2.x, node 20 for > 9.x
          NODE_SELECTOR="${VERSION:-$TRIGGER_VALUE}"
          case "$NODE_SELECTOR" in
            8.2.*) NODE_VERSION=16 ;;
            *)     NODE_VERSION=20 ;;
          esac

          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "trigger=${TRIGGER:-tag}" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          path: workflow-repo

      - uses: actions/checkout@v4
        with:
          repository: PrestaShop/PrestaShop
          ref: ${{ steps.resolve.outputs.ref }}
          path: prestashop-src
          fetch-depth: 0

      - name: Use workflow repo build tools
        run: |
          cp -r "${{ github.workspace }}/workflow-repo/tools/build" "${{ github.workspace }}/prestashop-src/tools/"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, gd, xml, dom, json, fileinfo, curl, zip, iconv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.resolve.outputs.node_version }}

      - name: Create Release directory
        id: release_dir
        run: |
          # Outside source/ to preserve workspace when building from old tags
          RELEASE_DIR="${{ github.workspace }}/build-release-output"
          echo "path=$RELEASE_DIR" >> $GITHUB_OUTPUT
          mkdir -p "$RELEASE_DIR"

      - name: Create build
        working-directory: ${{ github.workspace }}/prestashop-src
        run: |
          RELEASE_DIR="${{ steps.release_dir.outputs.path }}"
          VERSION_ARG=""
          # Pass --version for tags; for branch/commit CreateRelease uses Version.php from source
          if [ -n "${{ steps.resolve.outputs.version }}" ]; then
            VERSION_ARG="--version=${{ steps.resolve.outputs.version }}"
          fi
          php tools/build/CreateRelease.php --destination-dir="$RELEASE_DIR" $VERSION_ARG

      - name: List build artifacts
        run: |
          RELEASE_DIR="${{ steps.release_dir.outputs.path }}"
          echo "Build artifacts:"
          ls -la "$RELEASE_DIR"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: open-source-archive
          path: |
            ${{ steps.release_dir.outputs.path }}/prestashop_*.zip
            ${{ steps.release_dir.outputs.path }}/prestashop_*.xml
